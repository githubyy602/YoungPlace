server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:iam-auth-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

eureka:
  client:
    enabled: false

security:
  auth:
    captcha-enabled: true
    debug-return-captcha-code: true
    login-max-failures: 5
    lock-minutes: 15
