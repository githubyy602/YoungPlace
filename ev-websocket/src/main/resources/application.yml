spring:
  application:
    name: websocket-service
  main:
    web-application-type: none
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:youngplace-dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: false
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:youngplace-dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml

socketio:
  host: 0.0.0.0
  port: 9100
  origin: "*"
  ping-interval-ms: 25000
  ping-timeout-ms: 60000
  jwt-secret: ev-jwt-demo-secret

youngplace:
  debug:
    config-source: local-websocket-application
    topic-prefix: topic
    strict-token: false

eureka:
  instance:
    non-secure-port: ${socketio.port}
    prefer-ip-address: true
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    enabled-by-default: false
